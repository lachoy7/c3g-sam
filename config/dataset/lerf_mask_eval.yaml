# LERF-Mask is evaluation-only (mode=test). Do not use for training.
defaults:
  - base_dataset
  - view_sampler: all

name: lerf_mask
roots: [datasets/lerf_mask]

make_baseline_1: true
relative_pose: true
augment: false

input_image_shape: [256, 256]
original_image_shape: [256, 256]
cameras_are_circular: false

baseline_min: 1e-3
baseline_max: 1e2
max_fov: 120.0
skip_bad_shape: false

scenes: [figurines, ramen, teatime]
max_context_views: 24
