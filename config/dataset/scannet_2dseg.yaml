defaults:
  - base_dataset
  - view_sampler: bounded
  - optional view_sampler_dataset_specific_config@view_sampler: bounded_scannet_2dseg

name: scannet_2dseg
roots: [datasets/scannet]
# Empty list: discover all scenes on disk and split by scan number (see scannet_2dseg_splits).
scenes: []
val_scene_count: 80
test_scene_count: 80
make_baseline_1: true
augment: true

input_image_shape: [252, 252]
original_image_shape: [480, 640]
cameras_are_circular: false

baseline_min: 1e-3
baseline_max: 1e2
max_fov: 120.0

skip_bad_shape: false
num_of_inputs: 2
prompt_strategy: centroid
min_object_pixels: 16
# Precomputed SAM encoder features (256×64×64); omit sam_image resize when set.
sam_features_root: null
