defaults:
  - base_dataset
  - view_sampler: bounded
  - optional view_sampler_dataset_specific_config@view_sampler: bounded_replica_2dseg

name: replica_distill
roots: [datasets/replica]
# When set, load {frame_id}_sam.pt from here (e.g. Modal precompute volume). Else use roots[0].
sam_features_root: null
scenes: [office0, office1, office2, office3, office4, room0, room1, room2]
make_baseline_1: true
augment: true

# VGGT patch embed requires H,W divisible by 14 (252 = 18 * 14).
input_image_shape: [224, 224]
original_image_shape: [680, 1200]
cameras_are_circular: false

baseline_min: 1e-3
baseline_max: 1e2
max_fov: 120.0

skip_bad_shape: false
num_of_inputs: 2
