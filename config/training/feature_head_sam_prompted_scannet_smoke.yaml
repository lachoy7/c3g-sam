# @package _global_
# One-step smoke test on Modal (first scene). Run via:
#   modal run src/modal/train.py::smoke
#   modal run src/modal/train.py::smoke --experiment prompted

defaults:
  - feature_head_sam_prompted_scannet

wandb:
  name: sam_prompted_scannet_smoke
  mode: disabled

hydra:
  run:
    dir: /outputs/runs/${wandb.name}

dataset:
  scannet_2dseg:
    overfit_to_scene: scene0000_00
    sam_features_root: null

trainer:
  max_steps: 1
  val_check_interval: 10000

data_loader:
  train:
    num_workers: 0

checkpointing:
  save_top_k: 1
  debug_log_interval: 1000000

debug_decoder:
  enabled: false
